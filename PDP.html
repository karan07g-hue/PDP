<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan — Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --border: #1e1e2e;
            --text: #e2e2e8;
            --text-muted: #6e6e82;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --green: #34d399;
            --amber: #fbbf24;
            --rose: #f472b6;
            --cyan: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            background: rgba(10, 10, 15, 0.85) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }
        .navbar-brand {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--text) !important;
            letter-spacing: -0.5px;
        }
        .navbar-brand span { color: var(--accent); }
        .nav-link {
            color: var(--text-muted) !important;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 0.4rem 1rem !important;
            border-radius: 6px;
            transition: all 0.25s ease;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--text) !important;
            background: var(--accent-glow);
        }

        /* --- Hero --- */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
